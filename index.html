<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OperatorGame</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles/operator-game.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <div class="hud">
        <strong>OperatorGame</strong>
        <span>Click scene to look. WASD move. Aim at Button_Test and click.</span>
      </div>
      <div id="fpsMeter" class="fps-meter" aria-live="polite">FPS --</div>
      <pre id="debugOverlay" class="debug-overlay">camera</pre>
      <div class="crosshair" aria-hidden="true"></div>
      <button id="lockButton" type="button">Enter First Person</button>
      <canvas id="scene"></canvas>
      <div id="loadingOverlay" class="loading-overlay" aria-live="polite">
        <div class="loading-panel">
          <div class="loading-header">
            <span>CORE BOOT</span>
            <span id="loadingPercent">00%</span>
          </div>
          <div class="loading-body">
            <div class="loading-spinner" aria-hidden="true"></div>
            <div class="loading-copy">
              <strong id="loadingStatus">INITIALIZING OPERATOR CONSOLE</strong>
              <span id="loadingShiftTitle" class="loading-shift-title">YOUR FIRST FUSION SHIFT</span>
            </div>
          </div>
          <div class="loading-bar" aria-hidden="true">
            <div id="loadingBarFill"></div>
          </div>
        </div>
      </div>
      <div id="resultsOverlay" class="results-overlay" hidden>
        <div class="results-panel">
          <div class="results-header">
            <span>SHIFT REPORT</span>
            <span id="resultsOutcome">--</span>
          </div>
          <h1 id="resultsProfile">OPERATOR PROFILE</h1>
          <p id="resultsSummary">Awaiting shift data.</p>
          <div id="resultsStats" class="results-stats"></div>
          <button id="resultsRestartButton" type="button">START NEW SHIFT</button>
        </div>
      </div>
    </div>
    <script type="module" src="src/OperatorGame.js"></script>
  </body>
</html>
